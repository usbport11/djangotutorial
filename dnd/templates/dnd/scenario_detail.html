{% extends "base.html" %}

{% block title %}
    Scenario List Page
{% endblock %}

{% block extra_head %}
    <meta name="description" content="This is the scenario list page.">
{% endblock %}

{% block content %}
    <header class="bg-white shadow">
    <div class="mx-auto py-6 px-4 sm:px-6 lg:px-8">
      <h1 class="text-2xl font-bold text-gray-900">Scenario Detail</h1>
    </div>
    </header>

    <div class="overflow-hidden w-full overflow-x-auto rounded-sm border border-neutral-300 dark:border-neutral-700">
    <table class="w-full text-left text-sm text-neutral-600 dark:text-neutral-300">
        <thead class="border-b border-neutral-300 bg-neutral-50 text-sm text-neutral-900 dark:border-neutral-700 
		dark:bg-neutral-900 dark:text-white">
            <tr>
                <th scope="col" class="p-4">Property</th>
                <th scope="col" class="p-4">Value</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-neutral-300 dark:divide-neutral-700">
                <tr><td class="p-4"><b>Name<b></td><td class="p-4">{{ object.name }}</td></tr>
                <tr><td class="p-4"><b>Description</b></td><td class="p-4">{{ object.description }}</td></tr>
        </tbody>
    </table>
</div>

{% endblock %}
